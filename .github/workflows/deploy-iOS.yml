name: Upload to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # Fetches all submodules recursively

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build shared framework
        run: |
          ./gradlew linkReleaseFrameworkIosArm64
          ./gradlew linkReleaseFrameworkIosX64
          ./gradlew linkReleaseFrameworkIosSimulatorArm64

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS archive
        run: |
          xcodebuild -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/iosApp.xcarchive \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/iosApp.xcarchive \
            -exportOptionsPlist iosApp/exportOptions.plist \
            -exportPath $PWD/build

      - uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: "build/iosApp.ipa"
        env:
          APPSTORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
